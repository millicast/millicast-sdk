[metadata]
name = dlbio-commsqa-tests-millicast-sdk
description = Millicast SDK QA Tests

version = file: VERSION.txt

license = Other/Proprietary License
license_files = LICENSE
keywords = dolby.io qa
classifiers =
    Intended Audience :: Developers
    License :: Other/Proprietary License
    Operating System :: Microsoft
    Operating System :: MacOS
    Operating System :: POSIX :: Linux
    Programming Language :: Python :: 3.10

platforms =  windows, macos, linux

[options]
version = '
setup_requires =
include_package_data = yes
zip_safe = no
package_dir =
    =src
packages = find_namespace:
install_requires =
    dlbio-commsqa-tests-base >=5.4.6, <6.0.0
    gti-pytest-advanced-parametrization

python_requires = >=3.10

[options.extras_require]
doc =
    sphinx
    sphinx-autorun
test =
    pytest
    pytest-cov

[options.packages.find]
where = src

[check-manifest]
ignore =
  VERSION.txt

[devpi:upload]
formats = sdist.tgz
